<!DOCTYPE html>
<html lang="en">
<head>
	<title>Events</title>
	<!--Check user login state-->
	<script>
  const user = sessionStorage.getItem("loggedInUser");

  if (!user) {
    window.location.href = "index.html";
  }
</script>
	<!--Clear user login state-->
	<script>
		function logout() {
			sessionStorage.clear();
			localStorage.clear();
			window.location.href = "index.html";
		}
	</script>
	<link rel="icon" type="image/x-icon" href="favicon.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
	<div class="navbar">
  		<a class="active" href="events.html">Events</a>

  		<a href="FAQ.html">FAQ</a>
		<a href="about.html">About</a>
  		<div class="navright">
			<a href="#" onclick="logout(); return false;">Logout</a>
  		</div>
	</div>
	<h1>Events</h1>
	<h2>Join in on all the great community events!</h2>
	<hr>
	
<div id="eventsContainer"></div>
	<!--Call getevents worker api to dynamically populate events from the database
		Also implements admin controls with additional buttons and functions to approve/deny events-->
<script>
	const role = sessionStorage.getItem("role");
const container = document.getElementById("eventsContainer");

fetch("https://getevents.zacharyweldon2003.workers.dev/")
  .then(res => res.json())
  .then(events => {
  console.log("API RESPONSE:", events);
    container.innerHTML = ""; // clear any placeholder content

    events.forEach(event => {
		// Hide pending events from non-admin users
		console.log("STATUS:", event.status);
if (role !== "admin" && event.status === "pending") return;
      // Create card container
      const card = document.createElement("div");
      card.className = "container";

      // Event content
      card.innerHTML = `
		<img src="favicon.png" alt="Avatar">
		<span>${event.title}</span>
		<hr>
		<h3>${event.description}</h3>
		<details>
			<summary>More information on poster and event:</summary>
			<table>
				<tr>
					<td>Created By:</td>
					<td>${event.created_by}</td>
				<tr>
					<td>Campus:</td>
					<td>${event.campus}</td>
				</tr>
				<tr>
					<td>Location:</td>
					<td>${event.location}</td>
				</tr>
				<tr>
					<td>Date:</td> 
					<td>${event.event_date}</td>
				</tr>
				<tr>
					<td>Time:</td>
					<td>${event.event_time}</td>
				</tr>
			</table>
		</details>
        <div class="admin-controls" style="display:none;">
          <button class="approve-btn">Approve</button>
          <button class="deny-btn">Deny</button>
        </div>
      `;

      // Show admin controls if role = admin
      if (role === "admin") {
  const adminControls = card.querySelector(".admin-controls");
  adminControls.style.display = "block";

  // ✅ APPROVE BUTTON ONLY
  card.querySelector(".approve-btn").addEventListener("click", () => {
    console.log("Approving event:", event);

    fetch(`https://getevents.zacharyweldon2003.workers.dev/${event.event_id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "approved" })
    })
    .then(res => res.json())
    .then(data => {
      console.log("Approve response:", data);
      alert("Event approved!");
    })
    .catch(err => console.error(err));
  });

	// DENY BUTTON
		  card.querySelector(".deny-btn").addEventListener("click", () => {
  console.log("Denying event:", event);

  fetch(`https://getevents.zacharyweldon2003.workers.dev/${event.event_id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: "denied" })
  })
  .then(res => res.json())
  .then(data => {
    console.log("Deny response:", data);
    alert("Event denied!");
	card.remove();
  })
  .catch(err => console.error(err));
});
}

      container.appendChild(card);
    });

  })
  .catch(err => {
    container.innerHTML = `<p style="color:red;">Failed to load events: ${err.message}</p>`;
    console.error(err);
  });
</script>
