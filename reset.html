<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="index.html">Login</a>
        <a class="active" href="reset.html">Reset Password</a>
    </div>

    <!-- PAGE CONTENT (MATCHES INDEX STRUCTURE) -->
    <div class="container">
        <div class="card">

            <h2>Reset Password</h2>
            <p class="subtitle">Enter your username or email to reset your password.</p>

            <form id="resetForm">

                <div class="input-group" style="text-align: center;">
                    <label>Username or Email</label>
                    <input 
                        type="text" 
                        id="userInput" 
                        name="userInput" 
                        required
                    >
                </div>

                <br>

                <div class="location-center">
                    <button type="submit" class="login-button">
                        Send Reset Link
                    </button>
                </div>

            </form>

            <div class="message" id="message"></div>

            <div class="location-center" style="margin-top: 10px;">
                <a href="index.html">Back to Login</a>
            </div>

        </div> <!--Closes card-->
    </div><!--Closes container-->

    <!--Call resetpw worker API to send emails for password resets-->
    <script>
        document.getElementById("resetForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const input = document.getElementById("userInput").value;

            try {
                const response = await fetch("https://resetpw.zacharyweldon2003.workers.dev/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ identifier: input })
                });

                const data = await response.json();

                console.log("STEP 1 RAW RESPONSE:", data); 

                document.getElementById("message").innerText =
                data.message || data.error || "No response";

            } catch (error) {
                console.error(error);
                document.getElementById("message").innerText =
                "Something went wrong. Try again later.";
            }
        });
    </script>

</body>

</html>
