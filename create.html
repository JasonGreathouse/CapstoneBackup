  }
</script>
	<!--Clear user login state-->
	<script>
		function logout() {
			sessionStorage.clear();
			localStorage.clear();
			window.location.href = "index.html";
		}
	</script>
	<link rel="icon" type="image/x-icon" href="favicon.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="global.css">
</head>

<body>
	<div class="navbar">
  		<a href="events.html">Events</a>
  		<a class="active" href="create.html">Create</a>
  		<a href="FAQ.html">FAQ</a>

  		</div>
	</div>
	<h1>Create an Event!</h1>
	<h2>Fill in the form below to create your event.</h2>

	<form id="eventForm">
		<label for="title">Event Name</label>
		<input type="text" id="title" name="title" placeholder="Enter event name..." required>
		
		<label for="description">Description</label>
		<input type="text" id="description" name="description" placeholder="Describe the event..." required>
		
		<label for="location">Location</label>
		<input type="text" id="location" name="location" placeholder="Enter event location..." required>

		<label for="event_date">Event Date</label>
		<input type="date" id="event_date" name="event_date" required>

		<label for="event_time">Event Time</label>
		<input type="time" id="event_time" name="event_time" required>

		<label for="campus">Campus</label>
		<select id="campus" name="campus">
			<option value="macon">Macon</option>
			<option value="wrobins">Warner Robins</option>
			<option value="cochran">Cochran</option>
			<option value="dublin">Dublin</option>
			<option value="eastman">Eastman</option>
			<option value="online">Online</option>
		</select>

		<input type="submit" value="Submit">
	</form>

	<!--Call addevents worker API to deliver user input from the form to the database table-->
<script>
document.getElementById("eventForm").addEventListener("submit", async function(e) {
	e.preventDefault();

	const user = JSON.parse(sessionStorage.getItem("loggedInUser"));

	if (!user) {
		alert("You must be logged in to create an event.");
		window.location.href = "login.html";
	}

	const payload = {
		title: document.getElementById("title").value,
		description: document.getElementById("description").value,
		location: document.getElementById("location").value,
		event_date: document.getElementById("event_date").value,
		event_time: document.getElementById("event_time").value,
		campus: document.getElementById("campus").value,
		created_by: user.user_id
	};

	try {
		const response = await fetch("https://addevents.zacharyweldon2003.workers.dev/", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify(payload)
		});

		const data = await response.json();

		if (!response.ok) {
			throw new Error(data.error || "Failed to submit event");
		}

		alert(data.message || "Event submitted!");
		document.getElementById("eventForm").reset();
	} catch (err) {
		console.error(err);
		alert("Error submitting event: " + err.message);
	}
});
</script>
